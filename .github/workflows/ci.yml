name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      RAG_EMBEDDINGS_PROVIDER: hash
      ENCRYPTION_KEY_PATH: /tmp/dg_rag_test.key
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
