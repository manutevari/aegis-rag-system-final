version: "3.9"
services:
  api:
    build: .
    command: python main.py --mode api
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DB_BACKEND: postgres
      PG_HOST: postgres
      VECTOR_STORE: chroma
    volumes: [rag_data:/data, "./data/policies:/app/data/policies:ro"]
    depends_on:
      postgres: {condition: service_healthy}
    restart: unless-stopped

  ui:
    build: .
    command: python main.py --mode ui
    ports: ["8501:8501"]
    env_file: .env
    environment:
      DB_BACKEND: postgres
      PG_HOST: postgres
    volumes: [rag_data:/data, "./data/policies:/app/data/policies:ro"]
    depends_on: [postgres]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: policy_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    volumes: [pg_data:/var/lib/postgresql/data, "./app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d policy_rag"]
      interval: 10s; timeout: 5s; retries: 5
    restart: unless-stopped

volumes:
  rag_data:
  pg_data:
